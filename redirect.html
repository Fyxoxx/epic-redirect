<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening Epic Games Launcher...</title>
  <script>
    const slug = new URLSearchParams(window.location.search).get('slug');
    if (slug) {
      window.location.href = "com.epicgames.launcher://store/p/" + slug;
      setTimeout(() => window.close(), 1000);
    }
  </script>
</head>
<body>
  <p>Opening Epic Games Launcher...</p>
</body>
</html>
